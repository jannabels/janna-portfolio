    <title>Certificate Preview</title>
    <style>

        margin: 0;

        display: grid;

      .card {

      h1 { margin-top: 0; }
      p { color: #9fb0c7; line-height: 1.6; }
      a {
        display: inline-block;
        margin-top: 0.6rem;
        color: #5ee7d8;
        font-weight: 700;
        text-decoration: none;
      }

  <body>
    <div class="card">
