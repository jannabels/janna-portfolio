<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="background:#F0F2F5;font-family:Inter,sans-serif">
  <!-- Add application modal overlay -->
  <rect x="0" y="0" width="800" height="480" fill="rgba(0,0,0,0.45)"/>
  <!-- Modal -->
  <rect x="160" y="40" width="480" height="400" rx="14" fill="#fff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <!-- Modal header -->
  <rect x="160" y="40" width="480" height="52" rx="14" fill="#fff"/>
  <rect x="160" y="78" width="480" height="1" fill="#E5E7EB"/>
  <text x="184" y="72" font-size="14" font-weight="600" fill="#111827">Add application</text>
  <!-- Close button -->
  <text x="618" y="72" font-size="16" fill="#6B7280">✕</text>
  <!-- Form fields -->
  <!-- Row 1 -->
  <text x="184" y="112" font-size="10" font-weight="500" fill="#6B7280">Company name</text>
  <rect x="184" y="118" width="198" height="32" rx="5" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="196" y="138" font-size="11" fill="#111827">Acme Corp</text>
  <text x="402" y="112" font-size="10" font-weight="500" fill="#6B7280">Job title</text>
  <rect x="402" y="118" width="218" height="32" rx="5" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="414" y="138" font-size="11" fill="#111827">Product Manager</text>
  <!-- Row 2 -->
  <text x="184" y="168" font-size="10" font-weight="500" fill="#6B7280">Location</text>
  <rect x="184" y="174" width="198" height="32" rx="5" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="196" y="194" font-size="11" fill="#111827">Manila, PH</text>
  <text x="402" y="168" font-size="10" font-weight="500" fill="#6B7280">Salary</text>
  <rect x="402" y="174" width="218" height="32" rx="5" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="414" y="194" font-size="11" fill="#111827">₱80,000/mo</text>
  <!-- Row 3 -->
  <text x="184" y="224" font-size="10" font-weight="500" fill="#6B7280">Date applied</text>
  <rect x="184" y="230" width="198" height="32" rx="5" fill="#F7F8FA" stroke="#5B30B5" stroke-width="1.5"/>
  <text x="196" y="250" font-size="11" fill="#111827">2026-06-20</text>
  <text x="402" y="224" font-size="10" font-weight="500" fill="#6B7280">Status</text>
  <rect x="402" y="230" width="218" height="32" rx="5" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="414" y="250" font-size="11" fill="#111827">Applied</text>
  <!-- Row 4 -->
  <text x="184" y="280" font-size="10" font-weight="500" fill="#6B7280">Job type</text>
  <rect x="184" y="286" width="198" height="32" rx="5" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="196" y="306" font-size="11" fill="#111827">Full-time</text>
  <text x="402" y="280" font-size="10" font-weight="500" fill="#6B7280">Source</text>
  <rect x="402" y="286" width="218" height="32" rx="5" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="414" y="306" font-size="11" fill="#111827">LinkedIn</text>
  <!-- Notes -->
  <text x="184" y="336" font-size="10" font-weight="500" fill="#6B7280">Notes</text>
  <rect x="184" y="342" width="436" height="52" rx="5" fill="#F7F8FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="196" y="362" font-size="11" fill="#9CA3AF">Recruiter contact, follow-up reminder…</text>
  <!-- Footer buttons -->
  <rect x="478" y="408" width="72" height="30" rx="5" fill="none" stroke="#E5E7EB" stroke-width="1"/>
  <text x="514" y="427" font-size="11" fill="#6B7280" text-anchor="middle">Cancel</text>
  <rect x="558" y="408" width="110" height="30" rx="5" fill="#5B30B5"/>
  <text x="613" y="427" font-size="11" fill="#fff" text-anchor="middle" font-weight="500">Save application</text>
</svg>
